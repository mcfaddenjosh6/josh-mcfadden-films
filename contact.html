<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Josh McFadden Films</title>
<meta name="description" content="Get in touch with Josh McFadden Films for photography and videography projects.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=5">
</head>
<body>

<header class="site-header solid">
  <div class="header-inner">
    <a href="index.html" class="logo display">JMF</a>
    <nav class="main-nav">
      <a href="index.html">Home</a>
      <a href="work.html">Work</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
    <button class="nav-toggle" aria-label="Toggle menu">&#9776;</button>
  </div>
</header>

<div class="page-hero">
  <div class="eyebrow">Contact</div>
  <h1 class="page-title display">Let's work together.</h1>
  <p class="page-lede">Have a campaign, editorial, or short film in mind? Reach out directly or send a message below.</p>
</div>

<div class="contact-grid">

  <div class="contact-direct">
    <a class="email-link" href="mailto:mcfaddenjosh6@gmail.com">mcfaddenjosh6@gmail.com</a>
    <div class="contact-social">
      <a href="https://www.instagram.com/joshmcfadden_" target="_blank" rel="noopener">Instagram</a>
      <a href="#" target="_blank" rel="noopener">YouTube</a>
    </div>
  </div>

  <form id="contactForm" novalidate>
    <div class="field">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
    </div>
    <div class="field">
      <label for="message">Message</label>
      <textarea id="message" name="message" required></textarea>
    </div>
    <button type="submit" class="btn accent">Send message</button>
    <div class="form-status" id="formStatus"></div>
  </form>

</div>

<footer class="site-footer">
  <div>&copy; <span id="year"></span> Josh McFadden Films</div>
  <div class="footer-links">
    <a href="work.html">Work</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>
</footer>

<script>document.getElementById('year').textContent = new Date().getFullYear();</script>
<script src="js/main.js"></script>
</body>
</html>
